<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Start Game</title>
    <link rel="stylesheet" href="../CSS_FILE/start-style.css">
</head>
<body>
    <div class="start-container">
        
        <!-- animated background elements -->
        <div class="bg-shapes">
            <div class="shape shape-1">✊</div>
            <div class="shape shape-2">✋</div>
            <div class="shape shape-3">✌️</div>
            <div class="shape shape-4">✊</div>
            <div class="shape shape-5">✋</div>
            <div class="shape shape-6">✌️</div>
        </div>

        <!-- main content -->
        <div class="content-wrapper">

            <!-- hero image -->
            <div class="hero-section">
                <img src="../IMG/hero-image.png" alt="Rock Paper Scissors" class="hero-image">
            </div>

            <!-- title section -->
            <div class="title-section">
                <h1 class="main-title">
                    <span class="title-rock">Rock</span>
                    <span class="title-paper">Paper</span>
                    <span class="title-scissors">Scissors</span>
                </h1>
                <p class="tagline">The Classic Game of Strategy & Luck</p>
            </div>

            <!-- game preview -->
            <div class="preview-section">
                <div class="preview-cards">
                    <div class="preview-card rock-card">
                        <span class="card-icon">✊</span>
                        <span class="card-name">Rock</span>
                        <span class="card-beats">Beats Scissors</span>
                    </div>
                    <div class="preview-card paper-card">
                        <span class="card-icon">✋</span>
                        <span class="card-name">Paper</span>
                        <span class="card-beats">Beats Rock</span>
                    </div>
                    <div class="preview-card scissors-card">
                        <span class="card-icon">✌️</span>
                        <span class="card-name">Scissors</span>
                        <span class="card-beats">Beats Paper</span>
                    </div>
                </div>
            </div>

            <!-- features -->
            <div class="features-section">
                <div class="feature-item">
                    <span class="feature-icon">🎮</span>
                    <span class="feature-text">Easy to Play</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🏆</span>
                    <span class="feature-text">Track Your Score</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">⚡</span>
                    <span class="feature-text">Fast & Fun</span>
                </div>
            </div>

            <div class="cta-section">
                <a href="index.html" class="start-btn">
                    <span class="btn-glow"></span>
                    <span class="btn-text">Start Playing</span>
                    <span class="btn-arrow">→</span>
                </a>
                <p class="cta-hint">Click to challenge the computer!</p>
            </div>
        </div>

        <footer class="start-footer">
            <p>Ready to test your luck?</p>
        </footer>
    </div>
</body>
</html>
